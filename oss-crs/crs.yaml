name: octarine
type:
  - harness-gen
version: 0.1.0
docker_registry: ghcr.io/occia/octarine

prepare_phase:
  hcl: oss-crs/docker-bake.hcl

target_build_phase:
  - name: default-build
    dockerfile: oss-crs/builder.Dockerfile
    outputs:
      - build
      - src

crs_run_phase:
  harness-gen:
    dockerfile: oss-crs/harness_gen.Dockerfile
    additional_env:
      # Mark that we run inside the real OSS-CRS environment: the cross-run "memory" (resume) is a
      # local-testing hack backed by a /hack-memory bind-mount that does NOT exist here, and OSS-CRS's
      # first-class persistence is not ready yet. Non-empty => skip the memory scan, always start fresh.
      # Local-testing compose clears this (IN_OSS_CRS_ENV: "") to re-enable resume.
      IN_OSS_CRS_ENV: "1"
      # --- Verifier / budget knobs (override in compose) ---
      HARNESS_GEN_MAX_ROUNDS: "3"          # max generate+verify rounds
      HARNESS_GEN_FUZZ_SEC: "900"          # libFuzzer -max_total_time per harness (10-30min typical)
      HARNESS_GEN_MAX_WALLTIME_SEC: "0"    # whole-run wall cap, 0 = none
      HARNESS_GEN_ANALYSIS_CONCURRENCY: "3"
      HARNESS_GEN_TREAT_UNCERTAIN_DIRTY: "true"
      # HARNESS_GEN_FORK_JOBS: "0"         # libFuzzer -fork, 0 = auto from CPUs
      # --- Claude Code ---
      # ANTHROPIC_MODEL: claude-opus-4-6
      # CLAUDE_CODE_OAUTH_TOKEN: "${CLAUDE_CODE_OAUTH_TOKEN}"  # else uses OSS-CRS LLM proxy
      # CLAUDE_CODE_CLI_VERSION: "2.1.92"  # prepare-phase base image pin

supported_target:
  mode:
    - full
  language:  # v1: libFuzzer C/C++ only (jvm/Jazzer is a future extension)
    - c
    - c++
  sanitizer:
    - address
  architecture:
    - x86_64

required_llms:
  - claude-opus-4-6
  - claude-sonnet-4-6
  - claude-haiku-4-5-20251001
